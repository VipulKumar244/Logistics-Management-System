# --- General Project Settings ---
spring.application.name=logistics_backend

# --- H2 Database Configuration (In-Memory) ---
# Use one consistent URL so your seed data and frontend data go to the same place
spring.datasource.url=jdbc:h2:mem:logisticsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=2004

# --- Hibernate & JPA Settings ---
# 'create-drop' is essential for you right now because you are changing Entity fields.
# It ensures the database schema is deleted and rebuilt perfectly every time you restart.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- H2 Console (For Debugging) ---
# Access this at http://localhost:8080/h2-console to see if your coordinates are saving
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- Server Settings ---
server.port=8080