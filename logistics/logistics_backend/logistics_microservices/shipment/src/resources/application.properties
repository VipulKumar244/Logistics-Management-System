# --- Service Identity ---
# This identifies the service in a microservice cluster
spring.application.name=shipment-service
server.port=8080

# --- Database (Isolated for Shipment) ---
# Use file-backed H2 so data persists across application restarts
spring.datasource.url=jdbc:h2:file:./data/shipmentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=2004

# --- Hibernate & JPA Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- H2 Console ---
# Access this at http://localhost:8082/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console